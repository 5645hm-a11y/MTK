  brick_detected_title: "Appareil en état d'erreur ⚠"
  brick_detected_message: |
    Un appareil MTK a été détecté mais semble être dans un état d'erreur ou brick.

    Cela peut indiquer :
    • L'appareil est éteint
    • L'appareil est brické
    • Pilotes USB manquants ou incorrects

    Solutions :
    1. Installer les pilotes MTK USB VCOM
    2. Installer le pilote libusb/WinUSB avec Zadig (https://zadig.akeo.ie)
    3. Essayer de connecter l'appareil dans un mode différent
       - Maintenir Power + Volume Bas lors de la connexion
       - Ou maintenir Volume Haut + Volume Bas
  no_device_title: "Aucun appareil trouvé"
  no_device_message: |
    Aucun appareil MTK compatible trouvé.

    Veuillez vous assurer :
    • L'appareil MTK est connecté via USB
    • Les pilotes sont installés
    • Le câble USB fonctionne correctement

    Pour les appareils éteints ou brickés :
    L'appareil sera automatiquement détecté lorsqu'il sera connecté en USB.
    Pas besoin de l'allumer au préalable.
