  brick_detected_title: "מכשיר במצב שגיאה ⚠"
  brick_detected_message: |
    זוהה מכשיר MTK אך נראה שהוא במצב שגיאה או Brick.

    זה עשוי להעיד על:
    • המכשיר כבוי
    • המכשיר במצב Brick
    • חסרים דרייברים או שהדרייברים שגויים

    פתרונות:
    1. התקן דרייברי MTK USB VCOM
    2. התקן דרייבר libusb/WinUSB באמצעות Zadig (https://zadig.akeo.ie)
    3. נסה לחבר את המכשיר במצב אחר
       - החזק Power + Volume Down בזמן החיבור
       - או החזק Volume Up + Volume Down
  no_device_title: "לא נמצא מכשיר"
  no_device_message: |
    לא נמצא מכשיר MTK תואם.

    אנא וודא:
    • מכשיר MTK מחובר דרך USB
    • דרייברי המכשיר מותקנים
    • כבל ה-USB תקין

    עבור מכשירים כבויים או במצב Brick:
    המכשיר יזוהה אוטומטית כאשר יחובר ל-USB.
    אין צורך להדליק אותו תחילה.
