  brick_detected_message: |
    An MTK device was detected but appears to be in an error or brick state.

    This might indicate:
    • Device is powered off
    • Device is bricked
    • Missing or incorrect USB drivers

    Solutions:
    1. Install MTK USB VCOM drivers
    2. Install libusb/WinUSB driver using Zadig (https://zadig.akeo.ie)
    3. Try connecting device in different mode
       - Hold Power + Volume Down while connecting
       - Or hold Volume Up + Volume Down
  no_device_title: "No Device Found"
  no_device_message: |
    No compatible MTK device found.

    Please ensure:
    • MTK device is connected via USB
    • Device drivers are installed
    • USB cable is working properly

    For powered-off or bricked devices:
    The device will be auto-detected when connected to USB.
    No need to power it on first.
